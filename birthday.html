<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Riya 🎂</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff758c, #ffb199);
  text-align: center;
  color: #333;
  overflow: hidden;
}

.container {
  margin-top: 60px;
}

.card {
  background: white;
  padding: 30px;
  margin: auto;
  width: 85%;
  max-width: 420px;
  border-radius: 20px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.3);
}

h1 {
  color: #ff4d88;
}

/* PHOTO STYLE */
.profile-pic {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 15px;
  border: 4px solid #ff4d88;
}

#text {
  margin-top: 10px;
  min-height: 120px;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  background: #ff4d88;
  color: white;
  border-radius: 20px;
  cursor: pointer;
}

button:hover {
  background: #e6005c;
}

.heart {
  position: absolute;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh);}
  100% {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <div class="card">

    <!-- ADD PHOTO HERE -->
    <img src="riya.jpg" class="profile-pic">

    <h1>Happy Birthday, Riya Suwan! 🎂</h1>

    <div id="text"></div>

    <button onclick="showMessage()">Tap for Secret 👀</button>

    <p id="hiddenMsg" style="display:none; margin-top:15px;">
      🎁 Okay final message:<br><br>
      You’re honestly one of the coolest people I know online 😄<br>
      Stay fun, stay awesome… and maybe save one smile for me 😉<br><br>
      — Suro Kun ✨
    </p>

  </div>
</div>

<script>
let msg = "So today… the internet’s most stylish girl just leveled up 😄✨\n\nNot saying you're getting older… just more legendary 😉\n\nHope your day is full of smiles, good vibes, and zero stress 🎉";
let i = 0;

function typeWriter() {
  if (i < msg.length) {
    document.getElementById("text").innerHTML += msg.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
  }
}
typeWriter();

function showMessage() {
  document.getElementById("hiddenMsg").style.display = "block";
}

setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}, 500);
</script>

</body>
</html>
